<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">

  <!-- ============================================================
       HOME BASKET — Reversed / White Version (for dark backgrounds)
       ============================================================ -->

  <!-- Dark background for preview only (remove for actual use) -->
  <rect x="0" y="0" width="560" height="400" fill="#1A1A1A"/>

  <g id="icon" transform="translate(280, 30)">

    <!-- ROOF: warm gold (kept for brand recognition) -->
    <polygon points="0,0 -105,72 105,72" fill="#C9963A"/>
    <circle cx="0" cy="0" r="8" fill="#E8B84B"/>

    <!-- BASKET BODY: white -->
    <path d="
      M -88 72
      L  88 72
      L  64 168
      Q  0 182 -64 168
      Z
    " fill="white"/>

    <!-- BASKET SLATS: dark cutouts -->
    <rect x="-52" y="84" width="13" height="62" rx="6.5" fill="#1A1A1A"/>
    <rect x="-21" y="84" width="13" height="72" rx="6.5" fill="#1A1A1A"/>
    <rect x="10"  y="84" width="13" height="72" rx="6.5" fill="#1A1A1A"/>
    <rect x="41"  y="84" width="13" height="62" rx="6.5" fill="#1A1A1A"/>

  </g>

  <!-- Wordmark: white -->
  <text
    x="280"
    y="258"
    text-anchor="middle"
    font-family="'Nunito', 'Poppins', 'Helvetica Neue', Arial, sans-serif"
    font-size="54"
    font-weight="800"
    letter-spacing="-1"
    fill="white">Home</text>

  <line x1="196" y1="268" x2="364" y2="268" stroke="white" stroke-width="1.8" opacity="0.35"/>

  <text
    x="280"
    y="322"
    text-anchor="middle"
    font-family="'Nunito', 'Poppins', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="600"
    letter-spacing="8"
    fill="#C9963A">BASKET</text>

</svg>
